name: API Test Automation

# Rule 3.3: run the pipeline on pull requests targeting main
# (and on the resulting merge commit pushed to main).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-tests:
    name: Run API tests (path coverage)
    runs-on: ubuntu-latest

    steps:
      # Step 1: clone repository
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 2: run npm install
      - name: Install dependencies
        run: npm install

      # Step 3: run the API in background
      - name: Start API in background
        run: |
          npm start &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      # Step 4: wait until the API is running (Rule 3.2: use the health check)
      - name: Wait for API health check
        run: |
          echo "Waiting for the API health check at http://localhost:3000/healthcheck ..."
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/healthcheck || true)
            if [ "$status" = "200" ]; then
              echo "API is UP (health check returned 200)."
              exit 0
            fi
            echo "Attempt $i/30: API not ready yet (status=$status). Retrying in 2s..."
            sleep 2
          done
          echo "API did not become healthy in time."
          exit 1

      # Step 5: run the test scripts
      - name: Run API tests
        run: npm test

      - name: Stop API
        if: always()
        run: kill "$API_PID" || true
